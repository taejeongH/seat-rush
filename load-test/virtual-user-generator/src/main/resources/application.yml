spring:
  application:
    name: virtual-user-generator
  webflux:
    base-path: /

server:
  address: 127.0.0.1
  port: 8085

virtual-user:
  gateway-base-url: ${VIRTUAL_USER_GATEWAY_BASE_URL}
  request-timeout: ${VIRTUAL_USER_REQUEST_TIMEOUT:30s}
  queue-poll-interval: ${VIRTUAL_USER_QUEUE_POLL_INTERVAL:500ms}
  queue-wait-timeout: ${VIRTUAL_USER_QUEUE_WAIT_TIMEOUT:20m}
  payment-poll-interval: ${VIRTUAL_USER_PAYMENT_POLL_INTERVAL:200ms}
  payment-wait-timeout: ${VIRTUAL_USER_PAYMENT_WAIT_TIMEOUT:15s}
  action-delay-min: ${VIRTUAL_USER_ACTION_DELAY_MIN:300ms}
  action-delay-max: ${VIRTUAL_USER_ACTION_DELAY_MAX:1200ms}
  seat-retry-count: ${VIRTUAL_USER_SEAT_RETRY_COUNT:5}
  seat-retry-delay: ${VIRTUAL_USER_SEAT_RETRY_DELAY:150ms}
  max-seats-per-user: ${VIRTUAL_USER_MAX_SEATS_PER_USER:4}
  account-pool-file: ${VIRTUAL_USER_ACCOUNT_POOL_FILE:data/virtual-user-accounts.json}
  account-email-domain: ${VIRTUAL_USER_ACCOUNT_EMAIL_DOMAIN:seat-rush.local}
  account-password: ${VIRTUAL_USER_ACCOUNT_PASSWORD:Virtual-user-password!}
  token-refresh-buffer: ${VIRTUAL_USER_TOKEN_REFRESH_BUFFER:5m}
  preparation-lead-time: ${VIRTUAL_USER_PREPARATION_LEAD_TIME:10m}
