spring:
  application:
    name: payment-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Flyway로 스키마를 관리하므로 Hibernate 자동 DDL은 비활성화합니다.
      ddl-auto: none
    properties:
      hibernate:
        # 로컬 개발 로그에서 SQL을 읽기 쉽게 출력합니다.
        format_sql: true
    # 지연 로딩으로 DB 커넥션이 오래 유지되는 것을 막습니다.
    open-in-view: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: payment-service-payment-request
      # Kafka offset은 메시지 처리가 끝난 뒤 직접 commit합니다.
      enable-auto-commit: false
      # 개발 환경에서 기존 결제 요청 이벤트를 처음부터 다시 검증할 수 있게 합니다.
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # 서비스 간 DTO 패키지 결합을 피하기 위해 타입 헤더를 제거합니다.
        spring.json.add.type.headers: false
    listener:
      ack-mode: manual_immediate

  flyway:
    enabled: true
    # 기존 로컬 DB에 Flyway 이력이 없을 때도 현재 마이그레이션 기준으로 시작할 수 있게 합니다.
    baseline-on-migrate: true

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        seat.rush.business.duration: true
      percentiles:
        http.server.requests: 0.9,0.95,0.99
        seat.rush.business.duration: 0.9,0.95,0.99

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

outbox:
  relay:
    enabled: ${OUTBOX_RELAY_ENABLED:true}
    fixed-delay-ms: ${OUTBOX_RELAY_FIXED_DELAY_MS:1000}
    batch-size: ${OUTBOX_RELAY_BATCH_SIZE:100}
    max-retry-count: ${OUTBOX_RELAY_MAX_RETRY_COUNT:5}
    send-timeout-seconds: ${OUTBOX_RELAY_SEND_TIMEOUT_SECONDS:10}
    processing-lease-seconds: ${OUTBOX_RELAY_PROCESSING_LEASE_SECONDS:30}
