name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  backend-test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    env:
      DB_URL: jdbc:mysql://127.0.0.1:3306/${{ matrix.database }}?sslMode=DISABLED&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      DB_USERNAME: root
      DB_PASSWORD: root
      SEAT_REDIS_HOST: 127.0.0.1
      SEAT_REDIS_PORT: 6380
      QUEUE_REDIS_HOST: 127.0.0.1
      QUEUE_REDIS_PORT: 6379
      NOTIFICATION_REDIS_HOST: 127.0.0.1
      NOTIFICATION_REDIS_PORT: 6381
      SPRING_KAFKA_LISTENER_AUTO_STARTUP: false
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ${{ matrix.database }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
          - 6380:6379
          - 6381:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            database: seat_rush
          - service: ticket-service
            database: seat_rush
          - service: queue-service
            database: seat_rush
          - service: payment-service
            database: seat_rush_payment
          - service: notification-consumer
            database: seat_rush
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: backend/${{ matrix.service }}/**/*.gradle*

      - name: Generate Ticket Service test keys
        if: matrix.service == 'ticket-service'
        run: |
          mkdir -p src/main/resources/cert
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 \
            -out src/main/resources/cert/private-key.pem
          openssl rsa -pubout \
            -in src/main/resources/cert/private-key.pem \
            -out src/main/resources/cert/public-key.pem
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 \
            -out /tmp/entry-token-private-key.pem
          openssl rsa -pubout \
            -in /tmp/entry-token-private-key.pem \
            -out src/main/resources/cert/entry-token-public-key.pem

      - name: Generate Queue Service test keys
        if: matrix.service == 'queue-service'
        run: |
          mkdir -p src/main/resources/cert
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 \
            -out src/main/resources/cert/entry-token-private-key.pem
          openssl rsa -pubout \
            -in src/main/resources/cert/entry-token-private-key.pem \
            -out src/main/resources/cert/entry-token-public-key.pem

      - name: Test
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

  frontend-test:
    name: Test frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  build-and-push:
    name: Build ${{ matrix.image }}
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs:
      - backend-test
      - frontend-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: frontend
            context: frontend
          - image: api-gateway
            context: backend/api-gateway
          - image: ticket-service
            context: backend/ticket-service
          - image: queue-service
            context: backend/queue-service
          - image: payment-service
            context: backend/payment-service
          - image: notification-consumer
            context: backend/notification-consumer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/taejeongh/seat-rush-${{ matrix.image }}:${{ github.sha }}
            ghcr.io/taejeongh/seat-rush-${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  deploy:
    name: Deploy production
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs:
      - build-and-push
    runs-on:
      - self-hosted
      - linux
      - ARM64
      - seat-rush-production
    environment: production
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy application images
        env:
          APP_DIR: ${{ vars.EC2_APP_DIR }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          test -n "$APP_DIR"
          cd "$APP_DIR"
          test -z "$(git status --porcelain)"
          git pull --ff-only origin main
          IMAGE_TAG="$IMAGE_TAG" sh infra/scripts/deploy-server.sh

      - name: Verify deployment
        env:
          APP_DIR: ${{ vars.EC2_APP_DIR }}
        run: |
          cd "$APP_DIR"
          DOMAIN=$(sed -n 's/^DOMAIN=//p' infra/.env.production | tail -n 1 | tr -d '\r')
          sh infra/scripts/verify.sh "https://$DOMAIN"

      - name: Log out from GHCR
        if: always()
        run: docker logout ghcr.io
