spring:
  application:
    name: queue-service
  data:
    redis:
      # 대기열과 entryToken 상태를 저장하는 Redis입니다.
      host: ${QUEUE_REDIS_HOST:localhost}
      port: ${QUEUE_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: queue-service-schedule-status
      # 회차 상태 반영과 슬롯 반환 처리가 끝난 뒤 offset을 직접 commit합니다.
      enable-auto-commit: false
      # 개발 환경에서 기존 이벤트를 처음부터 다시 소비할 수 있게 합니다.
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: manual_immediate

server:
  port: 8082
  netty:
    connection-backlog: 65535
  tomcat:
    accept-count: 65535

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        seat.rush.business.duration: true
        lettuce.command.completion: true
      percentiles:
        http.server.requests: 0.9,0.95,0.99
        seat.rush.business.duration: 0.9,0.95,0.99

schedule:
  # Ticket Service의 LocalDateTime을 Redis epoch millis로 변환할 때 사용하는 기준 시간대입니다.
  time-zone: ${SCHEDULE_TIME_ZONE:Asia/Seoul}

queue:
  admission:
    # 동시에 좌석 선택 단계에 들어갈 수 있는 최대 사용자 수입니다.
    capacity: ${QUEUE_ADMISSION_CAPACITY:100}
    # 대기 화면 heartbeat가 끊겼을 때 사용자를 대기열에서 제거하기까지의 시간입니다.
    session-ttl: ${QUEUE_SESSION_TTL:30s}
  practice:
    # 연습 세션 Redis 데이터가 유지되는 시간입니다.
    data-ttl: ${QUEUE_PRACTICE_DATA_TTL:30m}
    # 활성 연습 세션 공통 키 TTL을 다시 연장하는 최소 간격입니다.
    ttl-refresh-interval: ${QUEUE_PRACTICE_TTL_REFRESH_INTERVAL:5m}

entry-token:
  # 좌석 선택 단계에서 사용할 수 있는 시간입니다.
  ttl: ${ENTRY_TOKEN_TTL:10m}
  issuer: ${ENTRY_TOKEN_ISSUER:seat-rush-queue-service}
  audience: ${ENTRY_TOKEN_AUDIENCE:seat-rush-ticket-service}
  private-key-location: classpath:cert/entry-token-private-key.pem
  public-key-location: classpath:cert/entry-token-public-key.pem

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
