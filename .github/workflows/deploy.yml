name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: server
        type: choice
        options:
          - server
          - all

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    env:
      EC2_HOST: ${{ vars.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER }}
      EC2_APP_DIR: ${{ vars.EC2_APP_DIR }}
      DEPLOY_TARGET: ${{ inputs.target || 'server' }}

    steps:
      - name: Configure SSH
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          ssh "$EC2_USER@$EC2_HOST" \
            "cd '$EC2_APP_DIR' && \
            git pull --ff-only origin main && \
            chmod +x infra/scripts/*.sh && \
            if [ '$DEPLOY_TARGET' = 'all' ]; then \
              ./infra/scripts/deploy.sh; \
            else \
              ./infra/scripts/deploy-server.sh; \
            fi"

      - name: Verify deployment
        run: |
          ssh "$EC2_USER@$EC2_HOST" \
            "cd '$EC2_APP_DIR' && \
            DOMAIN=\$(sed -n 's/^DOMAIN=//p' infra/.env.production | tail -n 1 | tr -d '\r') && \
            ./infra/scripts/verify.sh \"https://\$DOMAIN\""
