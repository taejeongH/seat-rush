spring:
  application:
    name: notification-consumer
  data:
    redis:
      host: ${NOTIFICATION_REDIS_HOST:localhost}
      port: ${NOTIFICATION_REDIS_PORT:6381}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:notification-consumer}
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: manual_immediate

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

notification:
  deduplication:
    processing-ttl: ${NOTIFICATION_PROCESSING_TTL:1m}
    completed-ttl: ${NOTIFICATION_COMPLETED_TTL:30d}
