spring:
  application:
    name: notification-consumer

  data:
    redis:
      host: ${NOTIFICATION_REDIS_HOST:localhost}
      port: ${NOTIFICATION_REDIS_PORT:6381}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:notification-consumer}
      # 알림 발송과 중복 처리 저장이 끝난 뒤 offset을 직접 commit합니다.
      enable-auto-commit: false
      # 개발 환경에서 기존 알림 이벤트를 처음부터 다시 소비할 수 있게 합니다.
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: manual_immediate

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        # notification-consumer는 외부 API가 없으므로 상태 확인용 health만 노출합니다.
        include: health
  endpoint:
    health:
      show-details: always

notification:
  deduplication:
    # PROCESSING 상태가 남아있을 수 있는 최대 시간입니다.
    processing-ttl: ${NOTIFICATION_PROCESSING_TTL:1m}
    # 이미 발송한 알림 이벤트 ID를 보관하는 기간입니다.
    completed-ttl: ${NOTIFICATION_COMPLETED_TTL:30d}
