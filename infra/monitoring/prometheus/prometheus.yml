global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: spring-applications
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:8080
        labels:
          service: api-gateway
      - targets:
          - ticket-service:8081
        labels:
          service: ticket-service
      - targets:
          - queue-service:8082
        labels:
          service: queue-service
      - targets:
          - payment-service:8083
        labels:
          service: payment-service
      - targets:
          - notification-consumer:8084
        labels:
          service: notification-consumer

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: mysql
    static_configs:
      - targets:
          - mysql-exporter:9104

  - job_name: redis
    static_configs:
      - targets:
          - queue-redis-exporter:9121
        labels:
          redis: queue
      - targets:
          - seat-redis-exporter:9121
        labels:
          redis: seat
      - targets:
          - notification-redis-exporter:9121
        labels:
          redis: notification

  - job_name: kafka
    static_configs:
      - targets:
          - kafka-exporter:9308
