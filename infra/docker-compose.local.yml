name: seat-rush-local-infra

services:
  queue-redis:
    image: redis:7.4-alpine
    container_name: seat-rush-local-queue-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - queue-redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  seat-redis:
    image: redis:7.4-alpine
    container_name: seat-rush-local-seat-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - seat-redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    container_name: seat-rush-local-kafka
    restart: unless-stopped
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      # KRaft 모드에서 사용하는 Kafka 노드 식별자와 역할
      # 단일 노드가 메시지를 처리하는 broker와 클러스터를 관리하는 controller 역할을 모두 수행한다.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # Kafka 접속 목적에 따라 Listener를 분리한다.
      # INTERNAL: Kafka UI 등 Docker 컨테이너 간 통신
      # CONTROLLER: KRaft 컨트롤러 통신
      # EXTERNAL: 호스트에서 실행하는 Spring 애플리케이션의 접속
      KAFKA_LISTENERS: INTERNAL://:29092,CONTROLLER://:9093,EXTERNAL://:9092

      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT

      # ZooKeeper 없이 동작하는 KRaft 컨트롤러 설정
      # 단일 컨트롤러 노드(ID 1)가 kafka:9093에서 클러스터 메타데이터를 관리한다.
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: seat-rush-local-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "127.0.0.1:8089:8080"

volumes:
  queue-redis-data:
    name: seat-rush-local-redis-data
  seat-redis-data:
    name: seat-rush-local-seat-redis-data
  kafka-data:
    name: seat-rush-local-kafka-data
