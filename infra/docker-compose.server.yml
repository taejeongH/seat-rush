name: seat-rush-server

x-spring-service: &spring-service
  restart: unless-stopped
  networks:
    - seat-rush
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    mem_limit: 128m
    sysctls:
      net.core.somaxconn: 65535
      net.ipv4.tcp_max_syn_backlog: 65535
    environment:
      DOMAIN: ${DOMAIN}
      NGINX_ENVSUBST_FILTER: ^DOMAIN$
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    command: ["nginx", "-g", "daemon off;"]
    depends_on:
      - frontend
      - api-gateway
    networks:
      - seat-rush

  certificate-proxy:
    image: nginx:1.27-alpine
    profiles:
      - tools
    environment:
      DOMAIN: ${DOMAIN}
      NGINX_ENVSUBST_FILTER: ^DOMAIN$
    ports:
      - "80:80"
    volumes:
      - ./nginx/certificate.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - seat-rush

  certbot:
    image: certbot/certbot:v4.0.0
    restart: unless-stopped
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: >
      /bin/sh -c '
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $$!;
        done
      '
    networks:
      - seat-rush

  certificate-bootstrap:
    image: alpine:3.21
    profiles:
      - tools
    volumes:
      - certbot-conf:/etc/letsencrypt
    entrypoint: /bin/sh

  frontend:
    image: ${GHCR_NAMESPACE:-ghcr.io/taejeongh}/seat-rush-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: 128m
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - seat-rush

  api-gateway:
    <<: *spring-service
    image: ${GHCR_NAMESPACE:-ghcr.io/taejeongh}/seat-rush-api-gateway:${IMAGE_TAG:-latest}
    mem_limit: 384m
    sysctls:
      net.core.somaxconn: 65535
      net.ipv4.tcp_max_syn_backlog: 65535
    environment:
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=30
      FRONTEND_URL: https://${DOMAIN}
      TICKET_SERVICE_URL: http://ticket-service:8081
      QUEUE_SERVICE_URL: http://queue-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
      JWT_PUBLIC_KEY_LOCATION: file:/run/secrets/access-token-public-key.pem
    volumes:
      - ./secrets/access-token-public-key.pem:/run/secrets/access-token-public-key.pem:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      ticket-service:
        condition: service_started
      queue-service:
        condition: service_started
      payment-service:
        condition: service_started

  ticket-service:
    <<: *spring-service
    image: ${GHCR_NAMESPACE:-ghcr.io/taejeongh}/seat-rush-ticket-service:${IMAGE_TAG:-latest}
    mem_limit: 768m
    environment:
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=30
      DB_URL: jdbc:mysql://mysql:3306/${TICKET_DB_NAME}?sslMode=DISABLED&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      DB_USERNAME: ${TICKET_DB_USERNAME}
      DB_PASSWORD: ${TICKET_DB_PASSWORD}
      SEAT_REDIS_HOST: seat-redis
      SEAT_REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_PRIVATE_KEY_LOCATION: file:/run/secrets/access-token-private-key.pem
      JWT_PUBLIC_KEY_LOCATION: file:/run/secrets/access-token-public-key.pem
      ENTRY_TOKEN_PUBLIC_KEY_LOCATION: file:/run/secrets/entry-token-public-key.pem
      JWT_ACCESS_TOKEN_EXPIRATION_SECONDS: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:-3600}
    volumes:
      - ./secrets/access-token-private-key.pem:/run/secrets/access-token-private-key.pem:ro
      - ./secrets/access-token-public-key.pem:/run/secrets/access-token-public-key.pem:ro
      - ./secrets/entry-token-public-key.pem:/run/secrets/entry-token-public-key.pem:ro
    expose:
      - "8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      retries: 5

  queue-service:
    <<: *spring-service
    image: ${GHCR_NAMESPACE:-ghcr.io/taejeongh}/seat-rush-queue-service:${IMAGE_TAG:-latest}
    mem_limit: 512m
    sysctls:
      net.core.somaxconn: 65535
      net.ipv4.tcp_max_syn_backlog: 65535
    environment:
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=30
      QUEUE_REDIS_HOST: queue-redis
      QUEUE_REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ENTRY_TOKEN_PRIVATE_KEY_LOCATION: file:/run/secrets/entry-token-private-key.pem
      ENTRY_TOKEN_PUBLIC_KEY_LOCATION: file:/run/secrets/entry-token-public-key.pem
      ENTRY_TOKEN_TTL: ${ENTRY_TOKEN_TTL:-10m}
      QUEUE_ADMISSION_CAPACITY: ${QUEUE_ADMISSION_CAPACITY:-100}
    volumes:
      - ./secrets/entry-token-private-key.pem:/run/secrets/entry-token-private-key.pem:ro
      - ./secrets/entry-token-public-key.pem:/run/secrets/entry-token-public-key.pem:ro
    expose:
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      retries: 5

  payment-service:
    <<: *spring-service
    image: ${GHCR_NAMESPACE:-ghcr.io/taejeongh}/seat-rush-payment-service:${IMAGE_TAG:-latest}
    mem_limit: 512m
    environment:
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=30
      DB_URL: jdbc:mysql://mysql:3306/${PAYMENT_DB_NAME}?sslMode=DISABLED&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      DB_USERNAME: ${PAYMENT_DB_USERNAME}
      DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    expose:
      - "8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      retries: 5

  notification-consumer:
    <<: *spring-service
    image: ${GHCR_NAMESPACE:-ghcr.io/taejeongh}/seat-rush-notification-consumer:${IMAGE_TAG:-latest}
    mem_limit: 384m
    environment:
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=30
      NOTIFICATION_REDIS_HOST: notification-redis
      NOTIFICATION_REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    expose:
      - "8084"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      retries: 5

networks:
  seat-rush:
    name: seat-rush-production-network
    external: true

volumes:
  certbot-conf:
  certbot-www:
