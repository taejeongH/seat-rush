spring:
  application:
    name: queue-service
  data:
    redis:
      host: ${QUEUE_REDIS_HOST:localhost}
      port: ${QUEUE_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: queue-service-schedule-status
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: manual_immediate

server:
  port: 8082

schedule:
  time-zone: ${SCHEDULE_TIME_ZONE:Asia/Seoul}

queue:
  admission:
    capacity: ${QUEUE_ADMISSION_CAPACITY:100}
    session-ttl: ${QUEUE_SESSION_TTL:30s}
  practice:
    data-ttl: ${QUEUE_PRACTICE_DATA_TTL:30m}

entry-token:
  ttl: ${ENTRY_TOKEN_TTL:10m}
  issuer: ${ENTRY_TOKEN_ISSUER:seat-rush-queue-service}
  audience: ${ENTRY_TOKEN_AUDIENCE:seat-rush-ticket-service}
  private-key-location: classpath:cert/entry-token-private-key.pem
  public-key-location: classpath:cert/entry-token-public-key.pem

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

