name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  backend-test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - ticket-service
          - queue-service
          - payment-service
          - notification-consumer
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: backend/${{ matrix.service }}/**/*.gradle*

      - name: Test
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

  frontend-test:
    name: Test frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  build-and-push:
    name: Build ${{ matrix.image }}
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs:
      - backend-test
      - frontend-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: frontend
            context: frontend
          - image: api-gateway
            context: backend/api-gateway
          - image: ticket-service
            context: backend/ticket-service
          - image: queue-service
            context: backend/queue-service
          - image: payment-service
            context: backend/payment-service
          - image: notification-consumer
            context: backend/notification-consumer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/taejeongh/seat-rush-${{ matrix.image }}:${{ github.sha }}
            ghcr.io/taejeongh/seat-rush-${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  deploy:
    name: Deploy production
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs:
      - build-and-push
    runs-on:
      - self-hosted
      - linux
      - ARM64
      - seat-rush-production
    environment: production
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy application images
        env:
          APP_DIR: ${{ vars.EC2_APP_DIR }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          test -n "$APP_DIR"
          cd "$APP_DIR"
          test -z "$(git status --porcelain)"
          git pull --ff-only origin main
          IMAGE_TAG="$IMAGE_TAG" sh infra/scripts/deploy-server.sh

      - name: Verify deployment
        env:
          APP_DIR: ${{ vars.EC2_APP_DIR }}
        run: |
          cd "$APP_DIR"
          DOMAIN=$(sed -n 's/^DOMAIN=//p' infra/.env.production | tail -n 1 | tr -d '\r')
          sh infra/scripts/verify.sh "https://$DOMAIN"

      - name: Log out from GHCR
        if: always()
        run: docker logout ghcr.io
